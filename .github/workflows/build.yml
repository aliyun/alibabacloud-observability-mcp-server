name: Build and Release

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  release:
    types: [ created ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install dependencies
      run: go mod download

    - name: Run tests
      run: go test -v ./...

    - name: Build
      run: make build

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: alibabacloud-observability-mcp-server-linux-amd64
        path: |
          bin/alibabacloud-observability-mcp-server
          config.yaml
        retention-days: 7

  build-release:
    name: Build Release Assets
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Build for ${{ matrix.goos }}-${{ matrix.goarch }}
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        VERSION=${{ github.event.release.tag_name }}
        COMMIT=$(git rev-parse --short HEAD)
        BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
        LDFLAGS="-s -w -X main.version=$VERSION -X main.gitCommit=$COMMIT -X main.buildTime=$BUILD_TIME"
        
        mkdir -p dist
        
        if [ "${{ matrix.goos }}" = "windows" ]; then
          go build -ldflags "$LDFLAGS" -o dist/alibabacloud-observability-mcp-server.exe ./cmd/server
        else
          go build -ldflags "$LDFLAGS" -o dist/alibabacloud-observability-mcp-server ./cmd/server
        fi
        
        # Copy config.yaml to dist
        cp config.yaml dist/

    - name: Create release archive
      run: |
        cd dist
        if [ "${{ matrix.goos }}" = "windows" ]; then
          zip -r ../alibabacloud-observability-mcp-server-${{ matrix.goos }}-${{ matrix.goarch }}.zip .
        else
          tar -czf ../alibabacloud-observability-mcp-server-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz .
        fi

    - name: Upload release asset
      uses: softprops/action-gh-release@v2
      with:
        files: |
          alibabacloud-observability-mcp-server-${{ matrix.goos }}-${{ matrix.goarch }}.*
