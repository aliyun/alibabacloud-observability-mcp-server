name: Go Binary Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (如 1.0.0)'
        required: true
        type: string
      pr_numbers:
        description: '包含的 PR 编号，逗号分隔 (如 46,49)，留空则自动收集上次 release 以来的所有合并 PR'
        required: false
        type: string
      dry_run:
        description: '试运行 (不实际发布)'
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests
        run: go test ./... -v -count=1

      - name: Build all platforms
        run: make build-all VERSION=v${{ inputs.version }}

      - name: List built binaries
        run: ls -la bin/

      - name: Collect PR changelog
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          PR_NUMBERS="${{ inputs.pr_numbers }}"

          echo "## Go v${VERSION} ($(date +%Y-%m-%d))" > /tmp/changelog_entry.md

          if [ -n "$PR_NUMBERS" ]; then
            for pr in $(echo "$PR_NUMBERS" | tr ',' ' '); do
              PR_TITLE=$(gh pr view "$pr" --json title --jq '.title' 2>/dev/null || echo "PR #$pr")
              PR_AUTHOR=$(gh pr view "$pr" --json author --jq '.author.login' 2>/dev/null || echo "unknown")
              echo "- ${PR_TITLE} (#${pr}) @${PR_AUTHOR}" >> /tmp/changelog_entry.md
            done
          else
            LAST_TAG=$(git tag --list 'go/v*' --sort=-version:refname | head -n1)
            gh pr list --state merged --base master --limit 50 --json number,title,author \
              --jq '.[] | "- \(.title) (#\(.number)) @\(.author.login)"' >> /tmp/changelog_entry.md
          fi

          echo "" >> /tmp/changelog_entry.md

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/changelog_entry.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          cat /tmp/changelog_entry.md

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          git tag "go/v${VERSION}"
          git push origin "go/v${VERSION}"
          gh release create "go/v${VERSION}" \
            --title "Go v${VERSION}" \
            --notes "${{ steps.changelog.outputs.changelog }}" \
            bin/*
