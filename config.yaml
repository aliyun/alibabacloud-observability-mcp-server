# MCP Server 配置文件
# 配置按功能分类组织，凭证信息请在 .env 文件中配置

# 服务器配置
server:
  # 传输模式: stdio, sse, streamable-http
  # stdio: 标准输入输出（MCP 客户端启动时使用）
  # sse: Server-Sent Events
  # streamable-http: HTTP 流式传输（推荐生产环境使用）
#transport: streamable-http
  transport: sse
  
  # 监听地址（仅 sse/streamable-http 模式）
  host: "0.0.0.0"
  
  # 监听端口（仅 sse/streamable-http 模式）
  port: 8180

# 日志配置
logging:
  # 日志级别: debug, info, warn, error
  level: debug
  
  # 调试模式（输出完整请求/响应）
  debug_mode: true

# 工具集配置
toolkit:
  # 工具集范围: all, paas, iaas
  # all: 启用所有工具
  # paas: 仅启用 PaaS 工具（umodel_* 前缀）
  # iaas: 仅启用 IaaS 工具（sls_*, cms_* 前缀）
  scope: all

  # 精细化工具选择（可选）
  # 当 enabled_tools 非空时，仅注册列表中的工具（scope 仍决定加载哪些 toolkit）。
  # 取消注释需要的工具即可启用，其余保持注释状态。
  # enabled_tools:
  #   ## ── Shared 工具（通用） ──
  #   - introduction              # 获取服务介绍信息
  #   - list_workspace            # 列出可用工作空间
  #   - list_domains              # 列出工作空间中的实体域
  #   ## ── PaaS 工具（云监控 2.0，umodel_* 前缀） ──
  #   # 实体管理
  #   - umodel_get_entities       # 获取实体列表
  #   - umodel_get_neighbor_entities  # 获取实体邻居节点
  #   - umodel_search_entities    # 搜索实体
  #   # 数据集管理
  #   - umodel_list_data_set      # 列出数据集
  #   - umodel_search_entity_set  # 搜索实体集
  #   - umodel_get_entity_set    # 获取实体集 Schema 定义
  #   - umodel_list_related_entity_set  # 列出关联实体集
  #   # 数据查询
  #   - umodel_get_metrics        # 获取时序指标
  #   - umodel_get_golden_metrics # 获取黄金指标
  #   - umodel_get_relation_metrics  # 获取关系指标
  #   - umodel_get_logs           # 获取日志
  #   - umodel_get_events         # 获取事件
  #   - umodel_get_traces         # 获取链路详情
  #   - umodel_search_traces      # 搜索链路
  #   - umodel_get_profiling      # 获取性能剖析
  #   - umodel_data_agent_query   # 自然语言数据查询
  #   ## ── IaaS 工具（SLS/CMS 直接访问） ──
  #   # SLS 工具
  #   - sls_query_logstore        # 查询日志库
  #   - sls_query_metricstore     # 查询指标库（PromQL）
  #   - sls_list_projects         # 列出项目
  #   - sls_list_logstores        # 列出日志库
  #   - sls_list_metricstores     # 列出指标库
  #   - sls_text_to_sql           # 自然语言转 SQL
  #   - sls_text_to_sql_old       # 自然语言转 SQL（旧版）
  #   - sls_text_to_promql        # 自然语言转 PromQL
  #   - sls_text_to_spl           # 自然语言转 SPL
  #   - sls_execute_sql           # 执行 SQL 查询
  #   - sls_execute_spl           # 执行 SPL 查询
  #   - sls_get_context_logs      # 获取日志上下文
  #   - sls_log_explore           # 日志探索分析
  #   - sls_log_compare           # 日志对比分析
  #   - sls_sop                   # SLS 运维助手
  #   # CMS 工具
  #   - cms_query_metric          # 查询云监控指标
  #   - cms_list_metrics          # 列出可用指标
  #   - cms_list_namespaces       # 列出命名空间
  #   - cms_execute_promql        # 执行 PromQL 查询
  #   - cms_text_to_promql        # 自然语言转 PromQL

# 网络配置
network:
  # 最大重试次数
  max_retry: 1
  
  # 重试等待时间（秒）
  retry_wait_seconds: 1
  
  # 读取超时（毫秒）
  read_timeout_ms: 610000
  
  # 连接超时（毫秒）
  connect_timeout_ms: 30000

# 本地化配置
locale:
  # 时区（用于时间解析）
  timezone: Asia/Shanghai
  
  # 语言（用于错误消息等）
  language: zh-CN

# 运行时默认值配置
# 当工具调用未提供 regionId 或 workspace 时，使用此处的默认值
# 优先级: 环境变量 > .env 文件 > config.yaml
runtime:
  # 默认区域
  region: cn-hangzhou
  
  # 默认工作空间（PaaS 工具需要）
  # workspace: ""

# 端点覆盖配置（可选）
# 用于内网访问或自定义端点
